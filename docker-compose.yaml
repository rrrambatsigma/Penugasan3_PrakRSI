services:
  postgres:
    container_name: database_penugasan3
    image: postgres:18-alpine
    restart: always
    ports:
      - "5437:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    env_file: .env
    networks:
      - rsinet
  pgadmin:
    image: dpage/pgadmin4:9.10.0
    container_name: pgadmin_prakrsi3
    env_file: .env
    ports:
      - "5450:80"
    depends_on:
      - postgres
    networks:
      - rsinet

volumes:
  postgres_data:

networks:
  rsinet:
    driver: bridge